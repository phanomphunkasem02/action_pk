name: PK Cargo Scrape

on:
  schedule:
    - cron: '13 0 * * *'   # ดึง 10 หน้า ทุกวันเวลาประมาณ 07:13 น. (เวลาไทย)
  workflow_dispatch:
    inputs:
      max_pages:
        description: Safety limit for incremental page scanning
        required: false
        default: '10'

concurrency:
  group: pk-cargo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          PK_EMAIL: ${{ secrets.PK_EMAIL }}
          PK_PASSWORD: ${{ secrets.PK_PASSWORD }}
          PK_START_PAGE: 1
          PK_INCREMENTAL: ${{ github.event_name != 'schedule' && 'true' || 'false' }}
          # Scheduled runs refresh 10 pages; external runs scan up to 10 pages for new orders.
          PK_MAX_PAGES: ${{ github.event_name == 'schedule' && '10' || inputs.max_pages }}
        run: |
          test -n "$PK_EMAIL" || (echo "::error::Missing PK_EMAIL secret" && exit 1)
          test -n "$PK_PASSWORD" || (echo "::error::Missing PK_PASSWORD secret" && exit 1)
          python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "hotmailoo1000-bot"
          git config --global user.email "hotmailo1000@gmail.com"
          git add pkcargo_data.json
          git commit -m "Auto Update Data: $(date)" || echo "No changes to commit"
          git push
