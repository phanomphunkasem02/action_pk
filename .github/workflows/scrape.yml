name: PK Cargo Scrape

on:
  schedule:
    - cron: '13 0 * * *'   # ดึง 10 หน้า ทุกวันเวลาประมาณ 07:13 น. (เวลาไทย)
  workflow_dispatch:
    inputs:
      max_pages:
        description: Number of PK Cargo pages to scrape
        required: false
        default: '1'

concurrency:
  group: pk-cargo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Google Drive Credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN_JSON }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > credentials.json
          echo "$GDRIVE_TOKEN" > token.json

      - name: Run Scraper
        env:
          PK_EMAIL: ${{ secrets.PK_EMAIL }}
          PK_PASSWORD: ${{ secrets.PK_PASSWORD }}
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          PK_START_PAGE: 1
          # Daily GitHub schedule scrapes 10 pages. External/manual dispatch defaults to 1 page.
          PK_MAX_PAGES: ${{ github.event_name == 'schedule' && '10' || inputs.max_pages }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "hotmailoo1000-bot"
          git config --global user.email "hotmailo1000@gmail.com"
          git add pkcargo_data.json
          git commit -m "Auto Update Data: $(date)" || echo "No changes to commit"
          git push
